<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>FitTrack</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">FitTrack</div>
      <div class="header-right">
        <div
          class="week-badge"
          style="display: flex; align-items: center; gap: 8px"
        >
          <button
            onclick="changeWeek(-1)"
            style="
              background: none;
              border: none;
              color: var(--accent);
              font-size: 16px;
              cursor: pointer;
              padding: 0;
            "
          >
            ‹
          </button>
          <span id="weekBadge">Week 1</span>
          <button
            onclick="changeWeek(1)"
            style="
              background: none;
              border: none;
              color: var(--accent);
              font-size: 16px;
              cursor: pointer;
              padding: 0;
            "
          >
            ›
          </button>
        </div>
      </div>
    </header>

    <div class="nav">
      <button class="nav-btn active" onclick="showView('workouts')">
        Workouts
      </button>
      <button class="nav-btn" onclick="showView('meals')">Meals</button>
      <button class="nav-btn" onclick="showView('progress')">Progress</button>
    </div>

    <!-- ══ WORKOUTS ══ -->
    <div class="view active" id="view-workouts">
      <div id="weekOverview">
        <div class="section-title" style="margin-top: 4px">THIS WEEK</div>
        <div class="week-grid" id="weekGrid"></div>
      </div>
      <div id="dayDetail" style="display: none">
        <button class="back-btn" onclick="goBack()">← BACK TO WEEK</button>
        <div class="day-header">
          <h2 id="detailTitle"></h2>
          <p id="detailFocus"></p>
          <div
            id="equipmentList"
            style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px"
          ></div>
        </div>
        <div id="exerciseList"></div>
        <textarea
          id="dayNotes"
          placeholder="How did you feel? Any notes on today's session..."
          style="
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 14px;
            margin-bottom: 12px;
            resize: none;
            height: 100px;
            margin-top: 8px;
          "
          onchange="saveNotes(this.value)"
        ></textarea>
        <button class="save-day-btn" id="saveDayBtn" onclick="saveDay()">
          MARK DAY COMPLETE
        </button>
        <button class="skip-day-btn" id="skipDayBtn" onclick="skipDay()">
          SKIP DAY
        </button>
      </div>
    </div>

    <!-- ══ MEALS ══ -->
    <div class="view" id="view-meals">
      <div class="section-title" style="margin-top: 4px">MEAL LOG</div>
      <div class="date-strip" id="dateStrip"></div>
      <div class="calorie-bar-wrap">
        <div class="cal-header">
          <div>
            <div class="cal-total" id="calTotal">0</div>
            <div class="cal-goal">of 1800 kcal goal</div>
          </div>
          <div style="text-align: right">
            <div style="font-size: 13px; font-weight: 600" id="calRemain">
              1800 left
            </div>
            <div style="font-size: 12px; color: var(--muted)">remaining</div>
          </div>
        </div>
        <div class="cal-track">
          <div class="cal-fill" id="calFill" style="width: 0%"></div>
        </div>
      </div>
      <div class="meal-list" id="mealList"></div>
      <div class="suggest-section">
        <div class="suggest-title">✦ Suggested meals — tap + to add</div>
        <div id="suggestList"></div>
      </div>
    </div>

    <!-- ══ PROGRESS ══ -->
    <div class="view" id="view-progress">
      <div class="section-title" style="margin-top: 4px">YOUR PROGRESS</div>
      <div class="progress-grid">
        <div class="stat-card">
          <div class="stat-val" id="statWorkouts">0</div>
          <div class="stat-label">Workouts done</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statStreak">0</div>
          <div class="stat-label">Day streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statMeals">0</div>
          <div class="stat-label">Meals logged</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statCal">0</div>
          <div class="stat-label">Avg daily kcal</div>
        </div>
      </div>
      <div class="section-title">WEEK LOG</div>
      <div class="week-log" id="weekLogList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Scripts load in dependency order -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/workouts.js"></script>
    <script src="js/meals.js"></script>
    <script src="js/progress.js"></script>
    <script>
      // Initialise
      renderWeekOverview();
    </script>
  </body>
</html>
