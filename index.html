<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>FitTrack</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">FitTrack</div>
      <div class="header-right">
        <div
          class="week-badge"
          style="display: flex; align-items: center; gap: 8px"
        >
          <button
            onclick="changeWeek(-1)"
            style="
              background: none;
              border: none;
              color: var(--accent);
              font-size: 16px;
              cursor: pointer;
              padding: 0;
            "
          >
            ‹
          </button>
          <span id="weekBadge">Week 1</span>
          <button
            onclick="changeWeek(1)"
            style="
              background: none;
              border: none;
              color: var(--accent);
              font-size: 16px;
              cursor: pointer;
              padding: 0;
            "
          >
            ›
          </button>
        </div>
        <button
          onclick="showSettings()"
          style="
            background: none;
            border: none;
            color: var(--muted);
            font-size: 20px;
            cursor: pointer;
            padding: 0;
          "
        >
          ⚙
        </button>
      </div>
    </header>

    <div class="nav">
      <button class="nav-btn active" onclick="showView('workouts')">
        Workouts
      </button>
      <button class="nav-btn" onclick="showView('calendar')">Calendar</button>
      <button class="nav-btn" onclick="showView('progress')">Progress</button>
    </div>

    <!-- ══ WORKOUTS ══ -->
    <div class="view active" id="view-workouts">
      <div id="weekOverview">
        <div class="section-title" style="margin-top: 4px">THIS WEEK</div>
        <div class="week-grid" id="weekGrid"></div>
      </div>
      <div id="dayDetail" style="display: none">
        <button class="back-btn" onclick="goBack()">← BACK TO WEEK</button>
        <div class="day-header">
          <h2 id="detailTitle"></h2>
          <p id="detailFocus"></p>
          <div
            id="equipmentList"
            style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px"
          ></div>
        </div>
        <div id="exerciseList"></div>
        <textarea
          id="dayNotes"
          placeholder="How did you feel? Any notes on today's session..."
          style="
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 14px;
            margin-bottom: 12px;
            resize: none;
            height: 100px;
            margin-top: 8px;
          "
          onchange="saveNotes(this.value)"
        ></textarea>
        <button class="save-day-btn" id="saveDayBtn" onclick="saveDay()">
          MARK DAY COMPLETE
        </button>
        <button class="skip-day-btn" id="skipDayBtn" onclick="skipDay()">
          SKIP DAY
        </button>
      </div>
    </div>

    <!-- ══ CALENDAR ══ -->
    <div class="view" id="view-calendar"></div>

    <!-- ══ PROGRESS ══ -->
    <div class="view" id="view-progress">
      <div class="section-title" style="margin-top: 4px">YOUR PROGRESS</div>
      <div class="progress-grid">
        <div class="stat-card">
          <div class="stat-val" id="statWorkouts">0</div>
          <div class="stat-label">Workouts done</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statStreak">0</div>
          <div class="stat-label">Day streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statMeals">0</div>
          <div class="stat-label">Meals logged</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statCal">0</div>
          <div class="stat-label">Avg daily kcal</div>
        </div>
      </div>
      <div class="section-title">WEEK LOG</div>
      <div class="week-log" id="weekLogList"></div>
    </div>

    <!-- ══ SETTINGS ══ -->
    <div class="view" id="view-settings">
      <div class="section-title" style="margin-top: 4px">SETTINGS</div>
      <div
        style="
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        "
      >
        <div
          onclick="editEquipmentProfile()"
          style="
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
          "
        >
          <div>
            <div style="font-weight: 600; font-size: 15px">
              Equipment Profile
            </div>
            <div
              style="font-size: 12px; color: var(--muted); margin-top: 2px"
              id="equipmentCount"
            >
              0 items selected
            </div>
          </div>
          <div style="color: var(--accent); font-size: 18px">›</div>
        </div>
        <div
          onclick="resetApp()"
          style="
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
          "
        >
          <div>
            <div style="font-weight: 600; font-size: 15px; color: var(--red)">
              Reset All Data
            </div>
            <div style="font-size: 12px; color: var(--muted); margin-top: 2px">
              Clear all workouts and settings
            </div>
          </div>
          <div style="color: var(--red); font-size: 18px">›</div>
        </div>
      </div>
    </div>

    <!-- ══ MODAL ══ -->
    <div
      id="modal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        align-items: flex-end;
        justify-content: center;
      "
    >
      <div
        style="
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius) var(--radius) 0 0;
          padding: 24px;
          width: 100%;
          max-width: 480px;
        "
      >
        <div
          id="modalTitle"
          style="
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
          "
        ></div>
        <div
          id="modalBody"
          style="font-size: 14px; color: var(--muted); margin-bottom: 24px"
        ></div>
        <div style="display: flex; gap: 10px">
          <button
            id="modalCancel"
            onclick="closeModal()"
            style="
              flex: 1;
              padding: 14px;
              background: none;
              border: 1px solid var(--border);
              border-radius: var(--radius);
              font-family: 'Bebas Neue', sans-serif;
              font-size: 18px;
              letter-spacing: 1px;
              color: var(--muted);
              cursor: pointer;
            "
          >
            NO THANKS
          </button>
          <button
            id="modalConfirm"
            style="
              flex: 1;
              padding: 14px;
              background: var(--accent);
              border: none;
              border-radius: var(--radius);
              font-family: 'Bebas Neue', sans-serif;
              font-size: 18px;
              letter-spacing: 1px;
              color: #0d0d0f;
              cursor: pointer;
            "
          >
            YES, UPDATE
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Scripts load in dependency order -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/equipment.js"></script>
    <script src="js/workouts.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/progress.js"></script>
    <script>
      // Initialise
      renderWeekOverview();
    </script>
  </body>
</html>
